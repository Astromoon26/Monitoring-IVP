<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVP Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A2233;
    --paper:#EFEBE1;
    --paper-2:#E4DFD2;
    --steel:#5C6B73;
    --steel-light:#AEB9BD;
    --amber:#D98E32;
    --amber-bg:#FBE9D2;
    --red:#B3432B;
    --red-bg:#F6DAD1;
    --line:#C9C2AF;
    --white:#FBFAF7;

    --s1:#8C99A6; /* New */
    --s2:#6F93A8; /* Receive */
    --s3:#4F8FA3; /* Confirm */
    --s4:#3D8E84; /* Validate */
    --s5:#3C9B6C; /* Billed */
    --s6:#4FAE5E; /* Sent */
    --s7:#3D7A33; /* Paid */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px;border-bottom:2px solid var(--ink);
    background:var(--white);
    flex-wrap:wrap;gap:12px;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .mark{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;
    letter-spacing:.12em;background:var(--ink);color:var(--white);
    padding:3px 7px;border-radius:3px;
  }
  .brand h1{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;margin:0;
    letter-spacing:-.01em;
  }
  .brand .sub{font-size:12px;color:var(--steel);font-family:'JetBrains Mono',monospace;}
  .status-line{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--steel);}
  .status-line button{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
    border:1.5px solid var(--ink);background:var(--white);color:var(--ink);
    padding:6px 12px;border-radius:5px;cursor:pointer;
  }
  .status-line button:hover{background:var(--ink);color:var(--white);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--s6);display:inline-block;}
  .dot.err{background:var(--red);}

  nav.tabs{
    display:flex;gap:0;padding:0 28px;background:var(--paper-2);
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;
    background:none;border:none;padding:14px 18px 12px;cursor:pointer;
    color:var(--steel);border-bottom:3px solid transparent;letter-spacing:.01em;
  }
  nav.tabs button.active{color:var(--ink);border-bottom-color:var(--amber);}

  main{padding:26px 28px 60px;max-width:1280px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  /* pipeline (signature element) */
  .pipeline{
    display:flex;border:2px solid var(--ink);border-radius:8px;overflow:hidden;
    margin-bottom:22px;background:var(--white);
  }
  .pipe-seg{
    flex:1;padding:14px 10px 12px;cursor:pointer;position:relative;
    border-right:1px solid rgba(255,255,255,.35);transition:transform .12s ease;
    color:var(--white);
  }
  .pipe-seg:last-child{border-right:none;}
  .pipe-seg:hover{transform:translateY(-2px);}
  .pipe-seg.selected{outline:3px solid var(--ink);outline-offset:-3px;z-index:2;}
  .pipe-seg .n{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1;}
  .pipe-seg .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;opacity:.92;margin-top:4px;font-weight:600;}
  .pipe-seg .step{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.75;}

  .toolbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;
    font-size:13px;
  }
  .toolbar input[type=text]{
    padding:8px 10px;border:1.5px solid var(--line);border-radius:5px;
    font-family:'JetBrains Mono',monospace;font-size:12.5px;width:200px;background:var(--white);
  }
  .toolbar select{
    padding:8px 10px;border:1.5px solid var(--line);border-radius:5px;
    font-family:'Inter',sans-serif;font-size:12.5px;background:var(--white);
  }
  .toolbar input[type=date]{
    padding:6px 8px;border:1.5px solid var(--line);border-radius:5px;
    font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--white);
  }
  .toolbar .daterange{display:flex;align-items:center;gap:6px;color:var(--steel);font-size:12px;font-weight:500;}
  .toolbar label.chk{display:flex;align-items:center;gap:6px;color:var(--steel);font-weight:500;cursor:pointer;}
  .toolbar .clear{
    font-size:12px;color:var(--steel);text-decoration:underline;cursor:pointer;border:none;background:none;
  }
  .toolbar .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--steel);}

  table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line);}
  thead th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--steel);padding:10px 12px;border-bottom:2px solid var(--ink);background:var(--paper-2);
    white-space:nowrap;
  }
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:12.5px;vertical-align:middle;}
  tbody tr:hover{background:var(--paper);}
  .lc{font-family:'JetBrains Mono',monospace;font-weight:600;}
  .badge{
    display:inline-block;padding:3px 8px;border-radius:4px;font-size:10.5px;font-weight:700;
    letter-spacing:.03em;text-transform:uppercase;
  }
  .badge.late{background:var(--red-bg);color:var(--red);}
  .badge.onsched{background:#DCEEDD;color:#2E6B33;}
  .badge.problem{background:var(--amber-bg);color:var(--amber);}
  .masked{letter-spacing:.2em;color:var(--steel-light);}

  .summary-strip{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
  .stat-card{
    background:var(--white);border:1.5px solid var(--ink);border-radius:7px;
    padding:14px 18px;min-width:150px;
  }
  .stat-card .v{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;}
  .stat-card .l{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .stat-card.warn .v{color:var(--amber);}

  .empty, .setup, .err-box{
    background:var(--white);border:1.5px dashed var(--line);border-radius:8px;
    padding:34px;text-align:center;color:var(--steel);font-size:13.5px;
  }
  .setup{text-align:left;border-color:var(--ink);}
  .setup h3{font-family:'Space Grotesk',sans-serif;margin-top:0;}
  .setup code{background:var(--paper-2);padding:2px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
  .setup ol{padding-left:20px;}
  .err-box{border-color:var(--red);color:var(--red);}

  footer{
    text-align:center;padding:18px;font-size:11px;color:var(--steel-light);
    font-family:'JetBrains Mono',monospace;
  }
  @media (max-width:760px){
    .pipeline{flex-wrap:wrap;}
    .pipe-seg{flex:1 1 25%;border-right:1px solid rgba(255,255,255,.35);border-bottom:1px solid rgba(255,255,255,.35);}
    table{font-size:11px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark">IVP</span>
    <div>
      <h1>IVP Dashboard</h1>
      <div class="sub">Dashboard IVP &middot; live dari Google Sheets</div>
    </div>
  </div>
  <div class="status-line">
    <span id="liveStatus"><span class="dot"></span> memuat...</span>
    <button id="refreshBtn">Refresh sekarang</button>
  </div>
</header>

<nav class="tabs">
  <button class="active" data-view="processing">Processing IVP</button>
  <button data-view="problem">IVP Problem</button>
</nav>

<main>

  <!-- ===================== PROCESSING IVP ===================== -->
  <section class="view active" id="view-processing">

    <div id="proc-pipeline" class="pipeline"></div>

    <div class="toolbar">
      <input type="text" id="procSearch" placeholder="Cari LC atau vendor...">
      <select id="procSiteFilter"><option value="">Semua site</option></select>
      <select id="procVendorFilter"><option value="">Semua vendor</option></select>
      <span class="daterange">Dari <input type="date" id="procDateFrom"> Sampai <input type="date" id="procDateTo"></span>
      <label class="chk"><input type="checkbox" id="procLateOnly"> Late saja</label>
      <label class="chk"><input type="checkbox" id="procHideSensitive"> Sembunyikan harga &amp; vendor</label>
      <button class="clear" id="procClear">Reset filter</button>
      <span class="count" id="procCount"></span>
    </div>
    <div style="font-size:11px;color:var(--steel);margin:-4px 0 14px;">Filter tanggal pakai tanggal status <b>1=NEW</b>.</div>

    <div id="proc-table-wrap"></div>
  </section>

  <!-- ===================== IVP PROBLEM ===================== -->
  <section class="view" id="view-problem">

    <div class="summary-strip">
      <div class="stat-card warn"><div class="v" id="probFlagged">–</div><div class="l">Ditandai bermasalah</div></div>
      <div class="stat-card"><div class="v" id="probExcluded">–</div><div class="l">Dikecualikan (Type D)</div></div>
      <div class="stat-card warn"><div class="v" id="probNet">–</div><div class="l">Net bermasalah</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="probSearch" placeholder="Cari No SI atau vendor...">
      <select id="probSiteFilter"><option value="">Semua site</option></select>
      <button class="clear" id="probClear">Reset filter</button>
      <span class="count" id="probCount"></span>
    </div>

    <div id="prob-table-wrap"></div>
  </section>

</main>

<footer>IVP Dashboard &mdash; data ditarik langsung dari Google Sheets, read-only.</footer>

<script>
/* ============================================================
   CONFIG — isi 3 nilai di bawah ini sebelum dipakai.
   Cara dapatin GID: buka Google Sheet "Dashboard IVP", klik
   tab/sheet yang dimaksud di bagian bawah, lihat angka setelah
   "#gid=" di address bar browser.
   ============================================================ */
const CONFIG = {
  SHEET_ID: '1_cC0Pg3qqrzSjkCRPbiCACdy384wraBfJwf_PAEknuo',
  GID_PROCESSING: 0,
  GID_PROBLEM:    1636819129,
  GID_EXCLUDE:    660228793,
  REFRESH_INTERVAL_MS: 5 * 60 * 1000
};

const STATUS_META = [
  {n:1, label:'New',     color:'var(--s1)'},
  {n:2, label:'Receive', color:'var(--s2)'},
  {n:3, label:'Confirm', color:'var(--s3)'},
  {n:4, label:'Validate',color:'var(--s4)'},
  {n:5, label:'Billed',  color:'var(--s5)'},
  {n:6, label:'Sent',    color:'var(--s6)'},
  {n:7, label:'Paid',    color:'var(--s7)'},
];

let state = {
  processing: [],
  problemRaw: [],
  excludeRaw: [],
  procStatusFilter: null,
  procHideSensitive: false,
};

function isConfigured(){
  return !/^PASTE_/.test(CONFIG.GID_PROCESSING) &&
         !/^PASTE_/.test(CONFIG.GID_PROBLEM) &&
         !/^PASTE_/.test(CONFIG.GID_EXCLUDE);
}

/* ---------- CSV fetch + parse ---------- */
function sheetUrl(gid){
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
}

function parseCSV(text){
  const rows = []; let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field=''; }
      else if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].trim() !== ''));
}

function rowsToObjects(rows){
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = (r[i] !== undefined ? r[i].trim() : ''));
    return obj;
  });
}

function col(obj, name){
  const key = Object.keys(obj).find(k => k.toLowerCase() === name.toLowerCase());
  return key ? obj[key] : '';
}

async function fetchSheetObjects(gid){
  const res = await fetch(sheetUrl(gid));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  return rowsToObjects(parseCSV(text));
}

/* ---------- formatting helpers ---------- */
function rupiah(v){
  const n = parseFloat(String(v).replace(/[^\d.-]/g,''));
  if (isNaN(n)) return v || '–';
  return 'Rp' + n.toLocaleString('id-ID');
}

function parseDMY(str){
  if (!str) return null;
  const m = String(str).trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3],10), parseInt(m[2],10)-1, parseInt(m[1],10));
}

/* Semua filter Processing IVP kecuali filter status (status difilter belakangan,
   supaya jumlah per status di pipeline tetap ikut filter site/vendor/tanggal/late). */
function getProcBaseRows(){
  const search = document.getElementById('procSearch').value.trim().toLowerCase();
  const site = document.getElementById('procSiteFilter').value;
  const vendor = document.getElementById('procVendorFilter').value;
  const lateOnly = document.getElementById('procLateOnly').checked;
  const fromVal = document.getElementById('procDateFrom').value;
  const toVal = document.getElementById('procDateTo').value;
  const dateFrom = fromVal ? new Date(fromVal) : null;
  const dateTo = toVal ? new Date(toVal) : null;

  let rows = state.processing;
  if (site) rows = rows.filter(r => col(r,'Supplying Site') === site);
  if (vendor) rows = rows.filter(r => col(r,'Name Vendor') === vendor);
  if (lateOnly) rows = rows.filter(r => col(r,'Performance').toLowerCase() === 'late');
  if (search) rows = rows.filter(r =>
    col(r,'LC').toLowerCase().includes(search) ||
    col(r,'Name Vendor').toLowerCase().includes(search)
  );
  if (dateFrom || dateTo) rows = rows.filter(r => {
    const d = parseDMY(col(r,'1=NEW'));
    if (!d) return false;
    if (dateFrom && d < dateFrom) return false;
    if (dateTo && d > dateTo) return false;
    return true;
  });
  return rows;
}

/* ============================================================
   PROCESSING IVP
   ============================================================ */
function renderPipeline(){
  const wrap = document.getElementById('proc-pipeline');
  const base = getProcBaseRows();
  wrap.innerHTML = '';
  STATUS_META.forEach(s => {
    const count = base.filter(r => parseInt(col(r,'Last Status'),10) === s.n).length;
    const seg = document.createElement('div');
    seg.className = 'pipe-seg' + (state.procStatusFilter === s.n ? ' selected' : '');
    seg.style.background = s.color;
    seg.innerHTML = `<div class="step">${s.n}</div><div class="n">${count}</div><div class="lbl">${s.label}</div>`;
    seg.onclick = () => {
      state.procStatusFilter = (state.procStatusFilter === s.n) ? null : s.n;
      renderPipeline(); renderProcTable();
    };
    wrap.appendChild(seg);
  });
}

function populateSiteFilter(selectEl, rows, fieldName, defaultLabel){
  const sites = Array.from(new Set(rows.map(r => col(r, fieldName)).filter(Boolean))).sort();
  selectEl.innerHTML = `<option value="">${defaultLabel}</option>` +
    sites.map(s => `<option value="${s}">${s}</option>`).join('');
}

function renderProcTable(){
  const hide = state.procHideSensitive;

  let rows = getProcBaseRows();
  if (state.procStatusFilter) rows = rows.filter(r => parseInt(col(r,'Last Status'),10) === state.procStatusFilter);

  document.getElementById('procCount').textContent = `${rows.length} tagihan`;

  if (!rows.length){
    document.getElementById('proc-table-wrap').innerHTML = '<div class="empty">Tidak ada tagihan yang cocok dengan filter ini.</div>';
    return;
  }

  const html = `
    <table>
      <thead><tr>
        <th>LC</th><th>Site</th><th>Vendor</th><th>Armada</th>
        <th>Status</th><th>Performance</th><th>Standard/Actual (hari)</th>
        <th>Deadline</th><th>Total Price</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => {
          const statusN = parseInt(col(r,'Last Status'),10);
          const meta = STATUS_META.find(s => s.n === statusN);
          const perf = col(r,'Performance').toLowerCase();
          return `<tr>
            <td class="lc">${col(r,'LC')}</td>
            <td>${col(r,'Supplying Site')}</td>
            <td>${hide ? '<span class="masked">••••••</span>' : col(r,'Name Vendor')}</td>
            <td>${col(r,'Jenis Armada')}</td>
            <td><span class="badge" style="background:${meta?meta.color:'#999'};color:#fff;">${meta?meta.label:'–'}</span></td>
            <td><span class="badge ${perf==='late'?'late':'onsched'}">${col(r,'Performance')||'–'}</span></td>
            <td class="mono">${col(r,'Standard (Days)')||'–'} / ${col(r,'Actual (Days)')||'–'}</td>
            <td class="mono">${col(r,'Deadline')||'–'}</td>
            <td class="mono">${hide ? '<span class="masked">••••••</span>' : rupiah(col(r,'Total Price'))}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  document.getElementById('proc-table-wrap').innerHTML = html;
}

/* ============================================================
   IVP PROBLEM
   ============================================================ */
function renderProblem(){
  const flagged = state.problemRaw.filter(r => col(r,'Validate Data IVP').trim().toLowerCase() === 'lc bermasalah');
  const excludeSet = new Set(state.excludeRaw.map(r => col(r,'No SI').trim().toLowerCase()).filter(Boolean));
  const net = flagged.filter(r => !excludeSet.has(col(r,'No SI').trim().toLowerCase()));

  document.getElementById('probFlagged').textContent = flagged.length;
  document.getElementById('probExcluded').textContent = flagged.length - net.length;
  document.getElementById('probNet').textContent = net.length;

  state._problemNet = net;
  populateSiteFilter(document.getElementById('probSiteFilter'), net, 'Supply site', 'Semua site');
  renderProblemTable();
}

function renderProblemTable(){
  const search = document.getElementById('probSearch').value.trim().toLowerCase();
  const site = document.getElementById('probSiteFilter').value;
  let rows = state._problemNet || [];
  if (site) rows = rows.filter(r => col(r,'Supply site') === site);
  if (search) rows = rows.filter(r =>
    col(r,'No SI').toLowerCase().includes(search) ||
    col(r,'Vendor').toLowerCase().includes(search)
  );

  document.getElementById('probCount').textContent = `${rows.length} tagihan bermasalah`;

  if (!rows.length){
    document.getElementById('prob-table-wrap').innerHTML = '<div class="empty">Tidak ada tagihan bermasalah untuk filter ini.</div>';
    return;
  }

  const html = `
    <table>
      <thead><tr>
        <th>No SI</th><th>Supply Site</th><th>Vendor</th><th>Type</th><th>Name Supply</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td class="lc">${col(r,'No SI')}</td>
          <td>${col(r,'Supply site')}</td>
          <td>${col(r,'Vendor')}</td>
          <td>${col(r,'TYPE')}</td>
          <td>${col(r,'Name Supply')}</td>
          <td><span class="badge problem">LC Bermasalah</span></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  document.getElementById('prob-table-wrap').innerHTML = html;
}

/* ============================================================
   LOAD + WIRE UP
   ============================================================ */
function showSetupPanel(){
  document.getElementById('proc-pipeline').innerHTML = '';
  const msg = `
    <div class="setup">
      <h3>Belum dikonfigurasi</h3>
      <p>Tiga GID di bagian atas <code>&lt;script&gt;</code> (CONFIG) masih placeholder. Buka Google Sheet
      "Dashboard IVP", klik tiap tab yang relevan di bagian bawah, lalu salin angka setelah <code>#gid=</code>
      di address bar ke <code>GID_PROCESSING</code>, <code>GID_PROBLEM</code>, dan <code>GID_EXCLUDE</code>.</p>
      <p>Pastikan juga sharing sheet-nya sudah "Anyone with the link – Viewer", supaya data bisa di-fetch
      tanpa login.</p>
    </div>`;
  document.getElementById('proc-table-wrap').innerHTML = msg;
  document.getElementById('prob-table-wrap').innerHTML = '';
  setLiveStatus(false, 'belum dikonfigurasi');
}

function setLiveStatus(ok, text){
  document.getElementById('liveStatus').innerHTML =
    `<span class="dot ${ok?'':'err'}"></span> ${text}`;
}

async function loadAll(){
  if (!isConfigured()){ showSetupPanel(); return; }
  setLiveStatus(true, 'memuat...');
  try {
    const [proc, prob, excl] = await Promise.all([
      fetchSheetObjects(CONFIG.GID_PROCESSING),
      fetchSheetObjects(CONFIG.GID_PROBLEM),
      fetchSheetObjects(CONFIG.GID_EXCLUDE),
    ]);
    state.processing = proc;
    state.problemRaw = prob;
    state.excludeRaw = excl;

    populateSiteFilter(document.getElementById('procSiteFilter'), proc, 'Supplying Site', 'Semua site');
    populateSiteFilter(document.getElementById('procVendorFilter'), proc, 'Name Vendor', 'Semua vendor');
    renderPipeline();
    renderProcTable();
    renderProblem();

    const now = new Date().toLocaleTimeString('id-ID');
    setLiveStatus(true, `live &middot; update terakhir ${now}`);
  } catch (e){
    setLiveStatus(false, 'gagal memuat data');
    document.getElementById('proc-table-wrap').innerHTML =
      `<div class="err-box">Gagal mengambil data dari Google Sheets (${e.message}).
      Cek lagi apakah sharing sheet sudah "Anyone with the link – Viewer" dan GID-nya benar.</div>`;
  }
}

document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  };
});

document.getElementById('refreshBtn').onclick = loadAll;
document.getElementById('procSearch').oninput = () => { renderPipeline(); renderProcTable(); };
document.getElementById('procSiteFilter').onchange = () => { renderPipeline(); renderProcTable(); };
document.getElementById('procVendorFilter').onchange = () => { renderPipeline(); renderProcTable(); };
document.getElementById('procDateFrom').onchange = () => { renderPipeline(); renderProcTable(); };
document.getElementById('procDateTo').onchange = () => { renderPipeline(); renderProcTable(); };
document.getElementById('procLateOnly').onchange = () => { renderPipeline(); renderProcTable(); };
document.getElementById('procHideSensitive').onchange = (e) => { state.procHideSensitive = e.target.checked; renderProcTable(); };
document.getElementById('procClear').onclick = () => {
  document.getElementById('procSearch').value = '';
  document.getElementById('procSiteFilter').value = '';
  document.getElementById('procVendorFilter').value = '';
  document.getElementById('procDateFrom').value = '';
  document.getElementById('procDateTo').value = '';
  document.getElementById('procLateOnly').checked = false;
  state.procStatusFilter = null;
  renderPipeline(); renderProcTable();
};
document.getElementById('probSearch').oninput = renderProblemTable;
document.getElementById('probSiteFilter').onchange = renderProblemTable;
document.getElementById('probClear').onclick = () => {
  document.getElementById('probSearch').value = '';
  document.getElementById('probSiteFilter').value = '';
  renderProblemTable();
};

loadAll();
setInterval(loadAll, CONFIG.REFRESH_INTERVAL_MS);
</script>
</body>
</html>
