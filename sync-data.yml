name: Sync IVP data

on:
  schedule:
    - cron: '*/15 * * * *'   # tiap 15 menit
  workflow_dispatch: {}      # bisa di-trigger manual dari tab Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ====================================================
      # Isi 3 GID di bawah ini (sama seperti yang sebelumnya
      # kamu cari dari URL tiap tab di Google Sheets).
      # ====================================================
      - name: Fetch sheets as CSV
        env:
          SHEET_ID: "1_cC0Pg3qqrzSjkCRPbiCACdy384wraBfJwf_PAEknuo"
          GID_PROCESSING: "PASTE_GID_DATA_PROSES_IVP"
          GID_PROBLEM: "PASTE_GID_VALIDATE_DATA_IVP"
          GID_EXCLUDE: "PASTE_GID_TYPE_D"
        run: |
          mkdir -p data
          curl -sL "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_PROCESSING}" -o data/processing.csv
          curl -sL "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_PROBLEM}" -o data/problem.csv
          curl -sL "https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_EXCLUDE}" -o data/exclude.csv
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_updated.txt
          echo "--- processing.csv (5 baris pertama) ---"
          head -n 5 data/processing.csv

      - name: Commit hasil fetch
        run: |
          git config user.name "ivp-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Sync data IVP $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
